<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidyaJobs.AI - Professional Portal</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body id="app-body">

<div id="ai-modal">
    <div class="ai-modal-content">
        <div class="ai-modal-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <button onclick="backHomeV10()" style="background:none; border:none; font-size:22px; color:var(--blue); cursor:pointer;">⬅</button>
                <span style="font-weight: 800; color: var(--blue);">🤖 VidyaJobs AI V10 PRO</span>
            </div>
            <span style="font-size:10px; font-weight:800; color:var(--text-muted);">ONLINE</span>
        </div>
        <div class="v8-chat-box">
            <div id="ai-chat-body" class="v8-messages"></div>
            <div class="v8-input-box">
                <button id="voiceBtn" style="background:none; border:none; font-size:20px; cursor:pointer;">🎙️</button>
                <input type="text" id="ai-input" class="v8-input" placeholder="Kuch bhi puchiye...">
                <button onclick="askOpenRouter()" class="v8-send">➤</button>
            </div>
        </div>
    </div>
</div>

<div id="ai-trigger" onclick="openV10Home()">
    <span class="ai-robot">🤖</span>
    <div class="ai-label">ASK AI</div>
</div>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="side-menu" id="sideMenu">
    <h3 style="margin-top:0; color:var(--blue);">VidyaJobs Settings ⚙️</h3>
    <div class="menu-item" onclick="editProfile()">👤 Edit Profile</div>
    <div class="menu-item" onclick="showV10UltraDash()">🔥 V10 Ultra Dash</div>
    <div class="menu-item" onclick="showResumeSection()">📝 Build Resume (New)</div>
    <div class="menu-item" onclick="toggleDarkMode()">🌓 Switch Theme</div>
    <div class="menu-item" onclick="location.reload()">🔄 Refresh Updates</div>
    <div class="menu-item" onclick="startNewChat()" style="color:var(--blue);">✨ Start New Chat</div>
    <div class="menu-item" onclick="clearAllV10()" style="color:orange;">🧹 Clear AI History</div>
    <div class="menu-item" style="color:red; border:none;" onclick="logout()">🚪 Logout</div>
</div>

<header id="main-header" class="hidden">
    <div class="logo-text" onclick="toggleMenu()">VidyaJobs.AI</div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div onclick="toggleDarkMode()" id="mode-btn" style="cursor:pointer; font-size: 20px;">🌙</div>
        <div id="user-initial" style="background:var(--light-blue); color:var(--blue); width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; border: 1px solid var(--blue);">U</div>
    </div>
</header>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
