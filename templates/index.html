<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROZGAR HUB | Professional Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --accent: #7c3aed;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --radius: 20px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --ai-gradient: linear-gradient(135deg, #2563eb, #7c3aed);
        }

        body.dark-mode {
            --bg: #020617;
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-muted: #94a3b8;
            --primary-light: #1e3a8a;
        }

        body { 
            background: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            padding-bottom: 100px; 
            color: var(--text-dark);
            transition: 0.3s;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Header UI */
        header { 
            background: var(--card-bg); 
            padding: 18px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .logo-text { 
            font-weight: 800; 
            font-size: 22px; 
            background: var(--ai-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Live Panel Fix */
        .live-panel { 
            background: #0f172a; 
            border-radius: var(--radius); 
            padding: 20px; 
            margin-bottom: 25px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .live-panel::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.2) 0%, transparent 70%);
        }

        /* Dashboard Grid - Fixes your "Low Level" UI */
        .dash-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            margin-top: 20px; 
        }

        .dash-card { 
            background: var(--card-bg); 
            padding: 20px 15px; 
            border-radius: var(--radius); 
            text-align: center; 
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.02);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .dash-card:active { transform: scale(0.95); }

        .dash-card i { 
            font-size: 28px; 
            margin-bottom: 12px; 
            display: block; 
            color: var(--primary);
        }

        .dash-card span { font-weight: 700; font-size: 14px; color: var(--text-dark); }

        /* AI Search Bar - High Level */
        .ai-search-container { 
            background: var(--card-bg);
            border-radius: 30px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 25px 0;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.1);
            border: 1px solid var(--primary-light);
        }

        .ai-search-input { 
            flex: 1; border: none; outline: none; 
            background: transparent; font-weight: 600; 
            color: var(--text-dark);
        }

        /* Bottom Nav - App Like */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 50%; 
            transform: translateX(-50%); width: 100%; 
            max-width: 500px; background: var(--card-bg); 
            display: flex; justify-content: space-around; 
            padding: 12px 0; border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.08); 
            z-index: 999;
        }

        .nav-item { 
            text-align: center; color: var(--text-muted); 
            font-size: 11px; font-weight: 700; 
            flex: 1;
        }

        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        /* Premium Buttons */
        .btn-primary { 
            background: var(--ai-gradient); 
            color: white; border: none; 
            padding: 16px; border-radius: 16px; 
            font-weight: 800; cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        /* Cards & Components */
        .card { 
            background: var(--card-bg); 
            border-radius: var(--radius); 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: var(--shadow);
        }

        /* Results Portal - Cleaned */
        .portal-btn-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .portal-item {
            background: var(--primary-light);
            padding: 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            color: var(--primary);
            border: 1px solid rgba(37, 99, 235, 0.1);
        }

        .hidden { display: none !important; }
        
        /* Floating AI Button */
        #ai-trigger {
            position: fixed; bottom: 90px; right: 20px;
            background: var(--ai-gradient);
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
            z-index: 1001;
        }
        #ai-trigger i { color: white; font-size: 24px; }
    </style>
</head>
<body>

<div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>

<header id="main-header" class="hidden">
    <div class="logo-text" onclick="toggleMenu()">ROZGAR HUB</div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <i class="fa-solid fa-circle-half-stroke" onclick="toggleDarkMode()" style="font-size: 20px; color: var(--primary);"></i>
        <div id="user-initial" style="background:var(--primary); color:white; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800;">R</div>
    </div>
</header>

<div class="container">
    
    <div id="dash-sec" class="hidden">
        
        <div class="live-panel">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:15px;">
                <span style="background:#ef4444; width:8px; height:8px; border-radius:50%;"></span>
                <span style="font-size:12px; font-weight:800; letter-spacing:1px;">LIVE UPDATES</span>
            </div>
            <div class="ticker-container" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div>
                    <div style="font-size:10px; opacity:0.6; margin-bottom:5px;">JOBS</div>
                    <div id="job-ticker" class="scroll-box"><div class="ticker-item">Fetching...</div></div>
                </div>
                <div>
                    <div style="font-size:10px; opacity:0.6; margin-bottom:5px;">ADMIT CARD</div>
                    <div id="admit-ticker" class="scroll-box"><div class="ticker-item">Fetching...</div></div>
                </div>
            </div>
        </div>

        <div class="ai-search-container">
            <i class="fa-solid fa-wand-magic-sparkles" style="color: var(--accent);"></i>
            <input type="text" id="main-search-inp" class="ai-search-input" placeholder="Railway Group D result kab aayega?">
            <i class="fa-solid fa-microphone" onclick="startMicV10Search()" style="color: var(--text-muted); cursor:pointer;"></i>
            <button onclick="triggerSearch()" style="background:var(--primary); border:none; color:white; width:35px; height:35px; border-radius:50%;"><i class="fa-solid fa-arrow-right" style="font-size:12px;"></i></button>
        </div>

        <h3 style="font-weight:800; font-size:16px;">Job Categories</h3>
        <div class="dash-grid">
            <div class="dash-card" onclick="openJobs('latest Govt job vacancy 2026')">
                <i class="fa-solid fa-building-columns"></i>
                <span>Govt Jobs</span>
            </div>
            <div class="dash-card" onclick="openJobs('Railway recruitment 2026 Group D')">
                <i class="fa-solid fa-train"></i>
                <span>Railway</span>
            </div>
            <div class="dash-card" onclick="openJobs('ITI Pass jobs 2026')">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                <span>ITI Jobs</span>
            </div>
            <div class="dash-card" onclick="openJobs('Work from home jobs')">
                <i class="fa-solid fa-house-laptop"></i>
                <span>Remote WFH</span>
            </div>
        </div>

        <div class="card" onclick="showCommunityChat()" style="margin-top:25px; display:flex; align-items:center; gap:15px; cursor:pointer;">
            <div style="background:var(--primary-light); width:50px; height:50px; border-radius:15px; display:flex; align-items:center; justify-content:center;">
                <i class="fa-solid fa-comments" style="color:var(--primary); font-size:20px;"></i>
            </div>
            <div style="flex:1;">
                <div style="font-weight:800; font-size:15px;">Community Help</div>
                <div style="font-size:12px; color:var(--text-muted);">Apne sawal poochein sabse</div>
            </div>
            <i class="fa-solid fa-chevron-right" style="color:var(--text-muted); font-size:12px;"></i>
        </div>
    </div>

    <div id="res-sec" class="hidden">
        <h3 style="font-weight:800; margin-bottom:20px;">Results Portal</h3>
        <div class="portal-btn-grid">
            <div class="portal-item" onclick="toggleResSub('magadh')">
                <i class="fa-solid fa-graduation-cap"></i> Magadh University
            </div>
            <div class="portal-item" onclick="toggleResSub('bihar-board')">
                <i class="fa-solid fa-school"></i> Bihar Board (10th/12th)
            </div>
            <div class="portal-item" onclick="toggleResSub('ssc')">
                <i class="fa-solid fa-user-shield"></i> SSC / Staff Selection
            </div>
        </div>
        </div>

</div>

<div id="ai-trigger" onclick="openV10Home()">
    <i class="fa-solid fa-robot"></i>
</div>

<div id="bottom-bar" class="bottom-nav hidden">
    <div class="nav-item active" onclick="showDash()">
        <i class="fa-solid fa-house-chimney"></i>Home
    </div>
    <div class="nav-item" onclick="showResults()">
        <i class="fa-solid fa-file-invoice"></i>Results
    </div>
    <div class="nav-item" onclick="openV10Home()">
        <i class="fa-solid fa-microchip"></i>AI Chat
    </div>
    <div class="nav-item" onclick="toggleMenu()">
        <i class="fa-solid fa-bars-staggered"></i>Menu
    </div>
</div>

<script>
    // ... (Aapka original JS logic yahan continue hoga) ...
    // Note: showDash() function mein `setActiveNav` ko update kar dena
</script>

</body>
</html>
